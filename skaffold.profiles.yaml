apiVersion: skaffold/v2beta29
kind: Config
metadata:
  name: offly-profiles
profiles:
  # Development profile with hot reload
  - name: dev
    activation:
      - command: dev
    build:
      artifacts:
        - image: bananaops/offly-backend
          context: backend
          docker:
            dockerfile: Dockerfile
          sync:
            manual:
              - src: '**/*.go'
                dest: /app
        - image: bananaops/offly-frontend
          context: frontend
          docker:
            dockerfile: Dockerfile
          sync:
            manual:
              - src: 'src/**/*'
                dest: /app/src
      local:
        push: false
        useBuildkit: true
    deploy:
      helm:
        releases:
          - name: offly-dev
            chartPath: helm/offly
            namespace: offly-dev
            setValues:
              replicaCount: 1
              mongodb.enabled: true
              ingress.enabled: false
              resources.requests.cpu: "50m"
              resources.requests.memory: "64Mi"
            setValueTemplates:
              image.repository: "{{.IMAGE_REPO_bananaops_offly_backend}}"
              image.tag: "{{.IMAGE_TAG_bananaops_offly_backend}}@{{.IMAGE_DIGEST_bananaops_offly_backend}}"

  # Staging profile
  - name: staging
    build:
      artifacts:
        - image: bananaops/offly-backend
          context: backend
        - image: bananaops/offly-frontend
          context: frontend
      tagPolicy:
        gitCommit:
          variant: AbbrevCommitSha
    deploy:
      helm:
        releases:
          - name: offly-staging
            chartPath: helm/offly
            namespace: offly-staging
            setValues:
              replicaCount: 2
              mongodb.enabled: true
              ingress.enabled: true
              ingress.hosts[0].host: staging.offly.example.com
              autoscaling.enabled: false
            setValueTemplates:
              image.repository: "{{.IMAGE_REPO_bananaops_offly_backend}}"
              image.tag: "{{.IMAGE_TAG_bananaops_offly_backend}}@{{.IMAGE_DIGEST_bananaops_offly_backend}}"

  # Production profile
  - name: production
    build:
      artifacts:
        - image: bananaops/offly-backend
          context: backend
        - image: bananaops/offly-frontend
          context: frontend
      tagPolicy:
        gitCommit:
          variant: Tags
    deploy:
      helm:
        releases:
          - name: offly
            chartPath: helm/offly
            namespace: offly-production
            setValues:
              replicaCount: 3
              mongodb.enabled: true
              mongodb.auth.enabled: true
              ingress.enabled: true
              ingress.hosts[0].host: offly.example.com
              ingress.tls[0].secretName: offly-tls
              ingress.tls[0].hosts[0]: offly.example.com
              autoscaling.enabled: true
              autoscaling.minReplicas: 3
              autoscaling.maxReplicas: 10
              resources.requests.cpu: "200m"
              resources.requests.memory: "256Mi"
              resources.limits.cpu: "1000m"
              resources.limits.memory: "512Mi"
            setValueTemplates:
              image.repository: "{{.IMAGE_REPO_bananaops_offly_backend}}"
              image.tag: "{{.IMAGE_TAG_bananaops_offly_backend}}@{{.IMAGE_DIGEST_bananaops_offly_backend}}"

  # Backend only profile
  - name: backend-only
    build:
      artifacts:
        - image: bananaops/offly-backend
          context: backend
    deploy:
      helm:
        releases:
          - name: offly-backend
            chartPath: helm/offly
            namespace: offly-dev
            setValueTemplates:
              image.repository: "{{.IMAGE_REPO_bananaops_offly_backend}}"
              image.tag: "{{.IMAGE_TAG_bananaops_offly_backend}}@{{.IMAGE_DIGEST_bananaops_offly_backend}}"

  # External MongoDB disabled (use external)
  - name: external-db
    deploy:
      helm:
        releases:
          - name: offly
            chartPath: helm/offly
            setValues:
              mongodb.enabled: false
              env.db.host: external-mongodb.example.com
              env.db.port: "27017"
            setValueTemplates:
              image.repository: "{{.IMAGE_REPO_bananaops_offly_backend}}"
              image.tag: "{{.IMAGE_TAG_bananaops_offly_backend}}@{{.IMAGE_DIGEST_bananaops_offly_backend}}"
