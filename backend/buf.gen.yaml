version: v1
managed:
  enabled: true
  go_package_prefix:
    default: absence-management
    except:
      - buf.build/googleapis/googleapis
plugins:
  - plugin: go
    out: .
    opt:
      - paths=source_relative
  - plugin: go-grpc
    out: .
    opt:
      - paths=source_relative
  - plugin: grpc-gateway
    out: .
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
  - plugin: openapiv2
    out: .
    opt:
      - openapi_naming_strategy=simple
