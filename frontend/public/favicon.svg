<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="calendarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C4DFF" />
      <stop offset="50%" stop-color="#FF6FB5" />
      <stop offset="100%" stop-color="#2ED1D1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C4DFF" />
      <stop offset="100%" stop-color="#2ED1D1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="8" fill="white"/>
  
  <!-- Calendar body -->
  <rect x="6" y="10" width="36" height="32" rx="4" fill="url(#calendarGradient)" opacity="0.15"/>
  <rect x="6" y="10" width="36" height="32" rx="4" stroke="url(#calendarGradient)" stroke-width="2.5"/>
  
  <!-- Calendar header -->
  <rect x="6" y="10" width="36" height="10" rx="4" fill="url(#headerGradient)"/>
  
  <!-- Rings -->
  <rect x="14" y="6" width="3" height="8" rx="1.5" fill="#6C4DFF"/>
  <rect x="31" y="6" width="3" height="8" rx="1.5" fill="#2ED1D1"/>

  <!-- Date dots -->
  <g opacity="0.9">
    <circle cx="12" cy="26" r="1.8" fill="#6C4DFF"/>
    <circle cx="18" cy="26" r="1.8" fill="#6C4DFF"/>
    <circle cx="24" cy="26" r="1.8" fill="#FF6FB5"/>
    <circle cx="30" cy="26" r="1.8" fill="#2ED1D1"/>
    <circle cx="36" cy="26" r="1.8" fill="#2ED1D1"/>

    <circle cx="12" cy="32" r="1.8" fill="#6C4DFF"/>
    <circle cx="18" cy="32" r="1.8" fill="#FF6FB5"/>
    <circle cx="24" cy="32" r="1.8" fill="#FF6FB5"/>
    <circle cx="30" cy="32" r="1.8" fill="#2ED1D1"/>
    <circle cx="36" cy="32" r="1.8" fill="#2ED1D1"/>

    <circle cx="12" cy="38" r="1.8" fill="#6C4DFF"/>
    <circle cx="18" cy="38" r="1.8" fill="#6C4DFF"/>
    <circle cx="24" cy="38" r="1.8" fill="#FF6FB5"/>
    <circle cx="30" cy="38" r="1.8" fill="#2ED1D1"/>
    <circle cx="36" cy="38" r="1.8" fill="#2ED1D1"/>
  </g>

  <!-- Checkmark -->
  <path d="M20 30 L22 32 L28 26" stroke="#FF6FB5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
